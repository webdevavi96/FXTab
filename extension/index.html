<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./global.css" />
  <title>New Tab</title>
</head>

<body>
  <video id="background" autoplay muted loop playsinline src="assets/background.mp4"></video>

  <div class="container">
    <header>
      <div class="time-info flex">
        <p class="time"></p>
        <p class="date"></p>
      </div>

      <div>
        <ul class="ribbon">
          <li><a target="_blank" class="short-link" href="https://google.com/">Google</a></li>
          <li><a target="_blank" class="short-link" href="https://www.reddit.com/">Reddit</a></li>
          <li><a target="_blank" class="short-link" href="https://github.com/">GitHub</a></li>
          <li><a target="_blank" class="short-link" href="https://www.linkedin.com/feed/">LinkedIn</a></li>
        </ul>
      </div>

      <div class="user">
        <input type="text" id="username" class="hidden"/>
        <p class="username">anonymous</p> |
        <button class="status">Edit</button>
        <button class="save hidden">Save</button>
      </div>

    </header>
    <main class="flex">
      <aside class="left side-pannel">
        <ul class="link-container">
          <li>
            <a class="link" href="https://m.youtube.com/">
              <img class="logo" src="https://www.google.com/s2/favicons?sz=64&domain_url=https://m.youtube.com/"
                alt="website logo" />
            </a>
          </li>
          <li>
            <a class="link" href="https://webdevavi96.netlify.app/">
              <img class="logo"
                src="https://www.google.com/s2/favicons?sz=64&domain_url=https://webdevavi96.netlify.app/"
                alt="website logo" />
            </a>
          </li>
        </ul>
        <div class="add-btn">
          <button id="add">+</button>
        </div>
      </aside>
      <div class="center"></div>
      <aside class="right ">
        <div class="analytics-card">

          <div class="analytics-header">
            <p>Activity</p>
            <span>Today</span>
          </div>

          <div class="stats">
            <div class="stat">
              <p class="stat-value" id="totalTime">0m</p>
              <span>Total</span>
            </div>
            <div class="stat">
              <p class="stat-value" id="topSite">—</p>
              <span>Top Site</span>
            </div>
          </div>

          <div class="chart-box">
            <canvas id="timeChart"></canvas>
          </div>

        </div>
      </aside>
    </main>
    <footer></footer>
  </div>

  <script src="./chart.js"></script>
  <script src="./min.js"></script>
</body>

</html>
